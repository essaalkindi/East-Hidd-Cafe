<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <title>سلة التسوق</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cart.css">
</head>

<body>

    <header class="header">

        <div class="menu-icon" id="menu-button">☰</div>

        <a href="index.html">
            <img src="images/logo.jpg" class="header-logo">
        </a>

        <div class="header-right">
            <div class="cart">🛒 <span id="cart-count">0</span></div>
            <span class="separator">|</span>
            <div class="today-date" id="today-date"></div>
        </div>

    </header>

    <!-- SIDE MENU -->
    <div id="side-menu" class="side-menu">

        <a href="javascript:void(0)" class="close-btn">&times;</a>

        <a href="index.html">🏠 الرئيسية</a>
        <a href="pickup.html">📦 منتجاتنا</a>
        <a href="contact.html">📞 إتصل بنا</a>
        <a href="cart.html">🛒 سلة التسوق</a>

    </div>

    <h1 class="title">🛒 سلة التسوق</h1>

    <div id="cart-items"></div>

    <div class="cart-total">
        المجموع: <span id="total-price">0</span> BD
    </div>

    <a href="pickup.html" class="continue-btn">
        ⬅ متابعة التسوق
    </a>

    <div class="order-form">

        <h2>بيانات الطلب</h2>

        <input type="text" id="customer-name" placeholder="الاسم">

        <input type="tel" id="customer-phone" placeholder="رقم الهاتف">

        <label>تاريخ الاستلام</label>
        <input type="date" id="pickup-date">

        <label>وقت الاستلام</label>
        <input type="time" id="pickup-time">

        <textarea id="customer-note" placeholder="ملاحظات (اختياري)"></textarea>

        <button id="send-order">
            إرسال الطلب عبر واتساب
        </button>

        <p class="payment-note">
            بعد إرسال الطلب يرجى إرسال Screenshot من BenefitPay
        </p>

    </div>

    <script src="cart.js"></script>

</body>

</html>
